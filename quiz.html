<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背单词应用 - 测验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>📚 背单词</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">主页</a></li>
                <li><a href="vocabulary.html">单词本</a></li>
                <li><a href="quiz.html" class="active">开始测验</a></li>
                <li><a href="#" id="logoutBtn">退出</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <!-- Quiz Setup Screen -->
        <div id="quizSetup" class="quiz-setup active">
            <h2>开始测验</h2>
            <p class="subtitle">选择测验设置</p>

            <div class="setup-card">
                <div class="form-group">
                    <label>题目数量</label>
                    <div class="question-count-options">
                        <button class="count-btn" data-count="5">5题</button>
                        <button class="count-btn active" data-count="10">10题</button>
                        <button class="count-btn" data-count="15">15题</button>
                        <button class="count-btn" data-count="20">20题</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>选择分类</label>
                    <select id="quizCategory">
                        <option value="">所有分类</option>
                    </select>
                </div>

                <div class="word-info">
                    <p>可用单词数：<strong id="availableWords">0</strong></p>
                </div>

                <button id="startQuizBtn" class="btn btn-primary btn-large">开始测验</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="quiz-screen">
            <div class="quiz-header">
                <div class="quiz-progress">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span>
                </div>
                <div class="quiz-timer">
                    ⏱️ <span id="timer">00:00</span>
                </div>
            </div>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <div class="question-card">
                <h3 class="question-word" id="questionWord">Loading...</h3>
                <p class="question-prompt">请选择正确的释义：</p>

                <div id="optionsContainer" class="options-container">
                    <!-- Options will be inserted here -->
                </div>
            </div>

            <div class="quiz-navigation">
                <button id="nextBtn" class="btn btn-primary" disabled>下一题</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="results-screen">
            <div class="results-card">
                <div class="results-icon" id="resultsIcon">🎉</div>
                <h2>测验完成！</h2>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="scorePercentage">0</span>%
                    </div>
                    <p class="score-text">
                        答对 <strong id="correctCount">0</strong> / <strong id="totalCount">0</strong> 题
                    </p>
                </div>

                <div class="results-stats">
                    <div class="stat-item">
                        <span class="stat-label">用时</span>
                        <span class="stat-value" id="timeTaken">00:00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">正确率</span>
                        <span class="stat-value" id="accuracyRate">0%</span>
                    </div>
                </div>

                <div id="wrongAnswers" class="wrong-answers">
                    <h3>错题回顾</h3>
                    <div id="wrongAnswersList"></div>
                </div>

                <div class="results-actions">
                    <button id="retryBtn" class="btn btn-secondary">再测一次</button>
                    <button id="backToDashboardBtn" class="btn btn-primary">返回主页</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
