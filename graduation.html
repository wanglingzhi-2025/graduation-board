<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业留言板 - 登录</title>
    <link rel="stylesheet" href="css/graduation.css">
</head>
<body class="graduation-theme">
    <div class="campus-scene" aria-hidden="true">
        <div class="sun-glow"></div>
        <div class="paper-plane plane-left">✈</div>
        <div class="paper-plane plane-right">✈</div>
        <div class="tree tree-left">
            <span class="tree-canopy"></span>
            <span class="tree-trunk"></span>
        </div>
        <div class="tree tree-right">
            <span class="tree-canopy"></span>
            <span class="tree-trunk"></span>
        </div>
        <div class="campus-building"></div>
        <div class="forest-path"></div>
        <div class="teen-group">
            <span class="teen teen-1"></span>
            <span class="teen teen-2"></span>
            <span class="teen teen-3"></span>
            <span class="teen teen-4"></span>
            <span class="teen teen-5"></span>
        </div>
    </div>
    <div class="container">
        <div class="login-box">
            <h1>🎓 毕业留言板</h1>
            <p class="subtitle">记录美好时光，珍藏青春回忆</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="school">选择学校</label>
                    <select id="school" required>
                        <option value="第一中学">第一中学</option>
                        <option value="第二中学">第二中学</option>
                        <option value="第三中学">第三中学</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="class">选择班级</label>
                    <select id="class" required>
                        <option value="8年1班" selected>8年1班</option>
                        <option value="8年2班">8年2班</option>
                        <option value="8年3班">8年3班</option>
                        <option value="8年4班">8年4班</option>
                        <option value="8年5班">8年5班</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名 (如: stu001 或 tch001)" required>
                    <small>学生账号: stu001-stu045 | 教师账号: tch001-tch010</small>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <small>默认密码与用户名相同</small>
                </div>

                <button type="submit" class="btn-login">登录</button>
            </form>

            <div class="info-box">
                <h3>💡 使用说明</h3>
                <ul>
                    <li>学生账号: stu001 ~ stu045</li>
                    <li>教师账号: tch001 ~ tch010</li>
                    <li>默认密码与用户名相同</li>
                    <li>可发布公开或私密留言</li>
                    <li>支持上传照片</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="js/graduation-auth.js"></script>
</body>
</html>
